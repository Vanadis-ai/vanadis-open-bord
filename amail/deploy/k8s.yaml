apiVersion: apps/v1
kind: Deployment
metadata:
  name: amail
  namespace: vanadis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: amail
  template:
    metadata:
      labels:
        app: amail
    spec:
      imagePullSecrets:
      - name: ghcr-auth
      containers:
      - name: amail
        image: ghcr.io/vanadis-ai/amail:latest
        ports:
        - containerPort: 8080
        env:
        - name: LISTEN_ADDR
          value: ":8080"
        - name: PUBLIC_URL
          value: "https://amail.vanadis.ai"
        envFrom:
        - secretRef:
            name: amail-secrets
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: amail
  namespace: vanadis
spec:
  selector:
    app: amail
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: amail
  namespace: vanadis
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
  - host: amail.vanadis.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: amail
            port:
              number: 8080
  tls:
  - hosts:
    - amail.vanadis.ai
    secretName: amail-vanadis-ai-tls
